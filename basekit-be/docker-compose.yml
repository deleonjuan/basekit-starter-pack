services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:-root}
      POSTGRES_PASSWORD: ${DB_PASS:-root}
      POSTGRES_DB:       ${DB_NAME:-master}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-root} -d ${DB_NAME:-master}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
    ports:
      - "${PORT:-3001}:3001"

volumes:
  pgdata:
